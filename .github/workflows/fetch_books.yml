name: 書籍化情報取得

on:
  workflow_dispatch:
    inputs:
      ncode:
        description: 'なろうNコード（例: N1234AB）。空欄の場合は novels.csv 全件を対象にする'
        required: false
        default: ''
      update_only:
        description: '書籍化フラグ済み作品の評価・レビュー数のみ再取得する（新規検索なし）'
        type: boolean
        default: false
      skip_cached:
        description: '取得済み作品をスキップする（update_only=false のときのみ有効）'
        type: boolean
        default: true

jobs:
  fetch-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: pip install -r scripts/requirements.txt

      - name: 書籍化情報取得
        run: |
          ARGS=""
          if [ "${{ inputs.update_only }}" = "true" ]; then
            ARGS="--update-only"
          else
            if [ -n "${{ inputs.ncode }}" ]; then
              ARGS="--ncode ${{ inputs.ncode }}"
            fi
            if [ "${{ inputs.skip_cached }}" = "false" ]; then
              ARGS="$ARGS --no-skip-cached"
            fi
          fi
          python scripts/fetch_books.py $ARGS

      - name: 類似度スコア計算・JSON 再生成
        run: python scripts/compute_similarity.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/book_works.csv docs/
          git diff --staged --quiet || git commit -m "chore: 書籍化情報更新 $(date '+%Y-%m-%d')"
          git push
