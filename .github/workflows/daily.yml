name: Daily data update

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日 JST 05:00
  workflow_dispatch:
    inputs:
      force_narou:
        description: 'なろう小説マスター更新を強制実行（月曜以外でも実行）'
        type: boolean
        default: false
      force_trends:
        description: 'PyTrends キャッシュ更新を強制実行（月曜以外でも実行）'
        type: boolean
        default: false
      force_annict:
        description: 'Annict アニメ化情報更新を強制実行（月曜以外でも実行）'
        type: boolean
        default: false
      update_norm_only:
        description: '正規化パラメータ (norm_params.json) のみ更新する（スコア計算はスキップ）'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: pip install -r scripts/requirements.txt

      - name: なろう小説マスター更新（週次）
        run: python scripts/fetch_narou.py
        env:
          FORCE_RUN: ${{ inputs.force_narou }}

      - name: 日次スナップショット追記
        run: python scripts/fetch_snapshots.py

      - name: PyTrends キャッシュ更新（週次）
        if: false  # 休止中（pytrends は非公式APIのため不安定）
        run: python scripts/fetch_trends.py
        env:
          FORCE_RUN: ${{ inputs.force_trends }}

      - name: Annict アニメ化情報更新（週次）
        run: python scripts/fetch_annict.py
        env:
          ANNICT_API_KEY: ${{ secrets.ANNICT_API_KEY }}
          FORCE_RUN: ${{ inputs.force_annict }}

      - name: 正規化パラメータのみ更新（update_norm_only が true の場合）
        if: ${{ inputs.update_norm_only == true }}
        run: python scripts/compute_similarity.py --update-norm-only

      - name: 類似度スコア計算・JSON 生成
        if: ${{ inputs.update_norm_only != true }}
        run: |
          if [ -f scripts/compute_similarity.py ]; then
            python scripts/compute_similarity.py
          else
            echo "compute_similarity.py は未実装のためスキップ（フェーズ2で実装予定）"
          fi

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
